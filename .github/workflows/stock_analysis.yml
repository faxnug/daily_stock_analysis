name: 股票分析自动化任务
on:
  schedule:
    # UTC时间10:00 = 北京时间18:00(A股收盘后)
    - cron: '0 10 * * 1-5'  # 周一至周五运行
  workflow_dispatch:  # 允许手动触发

jobs:
  run_analysis:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        attempt: [1, 2, 3]  # 最多重试3次
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 配置环境变量
        run: |
          cp .env.example .env
          echo "STOCK_SYMBOLS=${{ secrets.STOCK_SYMBOLS }}" >> .env
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> .env
          
      - name: 执行股票分析
        run: python main.py --auto --output=report
        if: ${{ matrix.attempt == 1 || failure() }}
        
      - name: 检查报告生成
        run: |
          if [ ! -f "reports/latest_analysis.md" ]; then
            echo "报告生成失败"
            exit 1
          fi
          
      - name: 发送成功通知
        if: success()
        run: python scripts/send_notification.py --status=success
        
      - name: 发送失败通知
        if: failure() && matrix.attempt == 3  # 最后一次尝试失败才通知
        run: python scripts/send_notification.py --status=failure

      # 在工作流中添加指标收集步骤
      # - name: 收集运行指标
      #  run: |
      #    python scripts/collect_metrics.py > metrics.json
